<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlexiFile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-theme">

<!-- ═══════════════════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="fa-regular fa-file"></i></div>
    <span class="logo-text">FlexiFile</span>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <button class="nav-item active" id="navExplorer" onclick="switchView('explorer')">
        <i class="ri-folder-2-line"></i>
        <span>Explorer</span>
      </button>
      <button class="nav-item" id="navTrash" onclick="openTrashPanel()">
        <i class="ri-delete-bin-6-line"></i>
        <span>Trash</span>
        <span id="trashBadge" class="nav-badge" style="display:none;">0</span>
      </button>
    </div>

    <div class="nav-section">
      <p class="nav-section-label">QUICK ACCESS</p>
      <button class="nav-item" onclick="listFiles('')">
        <i class="ri-home-4-line"></i>
        <span>Home</span>
      </button>
    </div>
  </nav>

  <div class="sidebar-footer">
    <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle theme">
      <i class="ri-moon-line" id="themeToggle"></i>
    </button>
    <div class="sidebar-contributors">
      <p id="contributors" class="contributors-text"></p>
    </div>
  </div>
</aside>

<!-- ═══════════════════════════════════════════════════════
     MAIN
════════════════════════════════════════════════════════ -->
<div class="main-wrapper">

  <!-- Top Bar -->
  <header class="topbar">
    <div class="breadcrumb" id="breadcrumb">
      <button class="breadcrumb-item home-crumb" onclick="listFiles('')">
        <i class="ri-home-4-line"></i> Home
      </button>
    </div>

    <div class="topbar-center">
      <div class="search-bar-wrap">
        <i class="ri-search-line search-icon"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search files..."
          autocomplete="off"
          oninput="debouncedSearch()"
        />
        <button id="searchClearBtn" onclick="clearSearch()" style="display:none;" class="search-clear-btn">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div id="searchResultsPanel" class="search-results-panel" style="display:none;"></div>
    </div>

    <div class="topbar-actions">
      <div class="filter-group" id="searchFilters">
        <button class="filter-pill active" id="filter-all" onclick="setFilter('all')">All</button>
        <button class="filter-pill" id="filter-file" onclick="setFilter('file')">Files</button>
        <button class="filter-pill" id="filter-folder" onclick="setFilter('folder')">Folders</button>
      </div>
      <button class="action-btn primary" onclick="openCreateFolderModal()">
        <i class="ri-add-line"></i> Folder
      </button>
      <button class="action-btn primary" onclick="document.getElementById('fileInput').click()">
        <i class="ri-add-line"></i> File
      </button>
      <input id="fileInput" type="file" hidden onchange="handleFileSelect()" />

      <div class="view-toggle">
        <button class="view-btn active" id="viewGrid" onclick="setViewMode('grid')" title="Grid view"><i class="ri-grid-fill"></i></button>
        <button class="view-btn" id="viewList" onclick="setViewMode('list')" title="List view"><i class="ri-list-check"></i></button>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="content-area">

    <!-- Spell Check Bar (collapsible toolbar) -->
    <div class="spell-toolbar" id="spellToolbar">
      <i class="ri-magic-line"></i>
      <input
        id="spellCheckPath"
        type="text"
        placeholder="Enter file path to spell-check…"
        aria-label="File path for spell check"
      />
      <button class="spell-btn" onclick="spellCheckFile()">Check Spelling</button>
      <button class="spell-close-btn" onclick="toggleSpellBar()"><i class="ri-close-line"></i></button>
    </div>

    <!-- Upload Area (hidden until triggered) -->
    <div class="upload-bar" id="uploadBar" style="display:none;">
      <i class="ri-upload-cloud-line"></i>
      <input id="uploadPath" type="text" placeholder="Upload to folder path (leave empty for root)…" />
      <button class="spell-btn" onclick="uploadFile()">Upload</button>
      <button class="spell-close-btn" onclick="toggleUploadBar()"><i class="ri-close-line"></i></button>
    </div>

    <!-- Toolbar buttons to open bars -->
    <div class="content-toolbar">
      <div class="content-toolbar-left">
        <span class="content-title" id="contentTitle">Home</span>
        <span class="item-count" id="itemCount"></span>
      </div>
      <div class="content-toolbar-right">
        <button class="tool-icon-btn" onclick="toggleSpellBar()" title="Spell Check">
          <i class="ri-magic-line"></i> Spell Check
        </button>
        <button class="tool-icon-btn" onclick="toggleUploadBar()" title="Upload File">
          <i class="ri-upload-cloud-line"></i> Upload
        </button>
      </div>
    </div>

    <!-- File/Folder Grid/List -->
    <div class="file-container" id="fileContainer">
      <ul id="fileList" class="file-grid"></ul>
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════
     CREATE FOLDER MODAL
════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="createFolderModal" style="display:none;" onclick="closeCreateFolderModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <i class="ri-folder-add-line"></i>
      <h3>New Folder</h3>
      <button class="modal-close" onclick="closeCreateFolderModal()"><i class="ri-close-line"></i></button>
    </div>
    <input
      id="folderPath"
      type="text"
      class="modal-input"
      placeholder="Folder name…"
      onkeydown="if(event.key==='Enter')createFolder()"
      autofocus
    />
    <div class="modal-foot">
      <button class="modal-cancel" onclick="closeCreateFolderModal()">Cancel</button>
      <button class="modal-confirm" onclick="createFolder()">Create</button>
    </div>
  </div>
</div>

<!-- Upload confirmation modal (triggered after file select) -->
<div class="modal-overlay" id="uploadModal" style="display:none;" onclick="closeUploadModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <i class="ri-upload-cloud-line"></i>
      <h3>Upload File</h3>
      <button class="modal-close" onclick="closeUploadModal()"><i class="ri-close-line"></i></button>
    </div>
    <p class="modal-desc" id="selectedFileName">No file selected</p>
    <input
      id="uploadPathModal"
      type="text"
      class="modal-input"
      placeholder="Upload to path (leave empty for current folder)…"
    />
    <div class="modal-foot">
      <button class="modal-cancel" onclick="closeUploadModal()">Cancel</button>
      <button class="modal-confirm" onclick="doUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- Theme + Scripts -->
<script>
  const themeToggle = document.getElementById("themeToggle");
  const body = document.body;
  const saved = localStorage.getItem("theme") || "light";
  body.className = saved + "-theme";
  updateThemeIcon();

  function updateThemeIcon() {
    if (body.classList.contains("dark-theme")) {
      themeToggle.className = "ri-sun-line";
    } else {
      themeToggle.className = "ri-moon-line";
    }
  }

  document.getElementById("themeToggleBtn").addEventListener("click", () => {
    if (body.classList.contains("light-theme")) {
      body.classList.replace("light-theme", "dark-theme");
      localStorage.setItem("theme", "dark");
    } else {
      body.classList.replace("dark-theme", "light-theme");
      localStorage.setItem("theme", "light");
    }
    updateThemeIcon();
  });

  /* ── Modal helpers ── */
  function openCreateFolderModal() {
    document.getElementById("createFolderModal").style.display = "flex";
    setTimeout(() => document.getElementById("folderPath").focus(), 50);
  }
  function closeCreateFolderModal(e) {
    if (!e || e.target === document.getElementById("createFolderModal")) {
      document.getElementById("createFolderModal").style.display = "none";
      document.getElementById("folderPath").value = "";
    }
  }

  let pendingFile = null;
  function handleFileSelect() {
    const fi = document.getElementById("fileInput");
    if (!fi.files[0]) return;
    pendingFile = fi.files[0];
    document.getElementById("selectedFileName").textContent = "📄 " + pendingFile.name;
    document.getElementById("uploadModal").style.display = "flex";
  }
  function closeUploadModal(e) {
    if (!e || e.target === document.getElementById("uploadModal")) {
      document.getElementById("uploadModal").style.display = "none";
      document.getElementById("fileInput").value = "";
      pendingFile = null;
    }
  }
  async function doUpload() {
    if (!pendingFile) return;
    const pathVal = document.getElementById("uploadPathModal").value.trim() || currentPath;
    const formData = new FormData();
    formData.append("file", pendingFile);
    try {
      const res = await fetch(`${BASE_URL}/upload-file/${pathVal}`, { method: "POST", body: formData });
      const data = await res.json();
      showToast(`📤 ${data.message}`, "success");
      listFiles(currentPath);
    } catch { showToast("❌ Upload failed!", "error"); }
    closeUploadModal();
  }

  /* ── Spell / Upload bars ── */
  function toggleSpellBar() {
    const bar = document.getElementById("spellToolbar");
    bar.classList.toggle("bar-open");
    if (bar.classList.contains("bar-open")) document.getElementById("spellCheckPath").focus();
  }
  function toggleUploadBar() {
    const bar = document.getElementById("uploadBar");
    bar.style.display = bar.style.display === "none" ? "flex" : "none";
    if (bar.style.display !== "none") document.getElementById("uploadPath").focus();
  }

  /* ── View mode ── */
  let viewMode = "grid";
  function setViewMode(mode) {
    viewMode = mode;
    const list = document.getElementById("fileList");
    list.className = mode === "grid" ? "file-grid" : "file-list-view";
    document.getElementById("viewGrid").classList.toggle("active", mode === "grid");
    document.getElementById("viewList").classList.toggle("active", mode === "list");
  }

  /* ── Breadcrumb updater ── */
  function updateBreadcrumb(path) {
    const bc = document.getElementById("breadcrumb");
    let html = `<button class="breadcrumb-item home-crumb" onclick="listFiles('')"><i class="ri-home-4-line"></i> Home</button>`;
    if (path) {
      const parts = path.split("/").filter(Boolean);
      let built = "";
      parts.forEach((p, i) => {
        built = built ? built + "/" + p : p;
        const snap = built;
        html += `<span class="bc-sep"><i class="ri-arrow-right-s-line"></i></span>`;
        html += `<button class="breadcrumb-item" onclick="listFiles('${snap}')">${p}</button>`;
      });
    }
    bc.innerHTML = html;

    const title = path ? path.split("/").filter(Boolean).pop() : "Home";
    document.getElementById("contentTitle").textContent = title;
  }

  /* ── Switch sidebar view ── */
  function switchView(view) {
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    document.getElementById("navExplorer").classList.add("active");
  }
</script>

<script src="script.js"></script>
<script src="script2.js"></script>
</body>
</html>
